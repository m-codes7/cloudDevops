name: Stage 2 - CI/CD

on:
  push:
    branches:
      - stage-2

jobs:
  build-test-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t clouddev:stage2 .

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/cloudDevops
            git pull origin stage-2
            docker rm -f clouddev-stage2 || true
            docker build -t clouddev:stage2 .
            docker run -d --name clouddev-stage2 -p 3000:3000 clouddev:stage2
